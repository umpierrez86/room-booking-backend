name: deploy

# CD a Railway. Solo se dispara cuando CI terminó correctamente sobre main.
# Requiere RAILWAY_TOKEN (secret), RAILWAY_SERVICE y PRODUCTION_URL (variables
# del repositorio). El token debe estar limitado al proyecto Railway correcto.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: railway up --service "$RAILWAY_SERVICE" --detach

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$PRODUCTION_URL/health" | grep -q '"status":"ok"'; then
              echo "production healthy"; exit 0
            fi
            echo "esperando a production... ($i)"; sleep 5
          done
          echo "production did not respond healthy"; exit 1
