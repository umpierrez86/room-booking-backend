name: deploy

# CD blue-green a Railway. Se dispara SOLO si el workflow "ci" terminó verde en main.
# Requiere:
#   - Secret RAILWAY_TOKEN (token de tu proyecto Railway).
#   - Secret/var GREEN_URL con la URL pública del servicio "backend-green".
#   - Un GitHub Environment llamado "production" con required reviewers → habilita el gate manual de promoción.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  # 1) Deploy de la versión nueva al servicio GREEN (idle, sin tráfico de prod todavía).
  deploy-green:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy a backend-green
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend-green --detach

  # 2) Smoke test contra GREEN antes de mandarle tráfico.
  smoke:
    needs: deploy-green
    runs-on: ubuntu-latest
    steps:
      - name: Health check de GREEN
        env:
          GREEN_URL: ${{ secrets.GREEN_URL }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$GREEN_URL/health" | grep -q '"status":"ok"'; then
              echo "green healthy"; exit 0
            fi
            echo "esperando a green... ($i)"; sleep 5
          done
          echo "GREEN no respondió sano — se aborta el cutover"; exit 1

  # 3) Promoción (cutover) — GATE MANUAL vía el Environment "production" (required reviewers).
  promote:
    needs: smoke
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Cutover blue -> green
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # BLUE-GREEN CUTOVER:
          # Reasignar el dominio público de "backend-blue" a "backend-green" → green pasa a servir el 100%.
          # NOTA HONESTA: Railway no expone un swap de dominio 100% estándar por CLI; según la versión de
          # la API puede requerir `railway domain` o la GraphQL API. Verificá el comando vigente al configurarlo.
          # Dejar BLUE vivo unos minutos como red de rollback (re-apuntar el dominio a blue si algo falla),
          # y recién después decomisionar BLUE.
          echo "Ejecutar swap de dominio backend-blue -> backend-green (ver comentario)."
